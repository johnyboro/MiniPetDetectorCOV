method: bayes
run_cap: 40
metric:
  name: val/loss
  goal: minimize
parameters:
  optimizer.lr:
    distribution: log_uniform_values
    min: 0.0001
    max: 0.01
  optimizer.weight_decay:
    distribution: log_uniform_values
    min: 0.000001
    max: 0.001
  optimizer.name:
    values: ["adam", "sgd"]
