method: bayes
metric:
  name: val/loss
  goal: minimize
parameters:
  optimizer.lr:
    distribution: log_uniform_values
    min: 0.0001
    max: 0.01
  optimizer.weight_decay:
    distribution: log_uniform_values
    min: 0.000001
    max: 0.001
  data.batch_size:
    values: [16, 32, 64]
  train.epochs:
    values: [8, 10, 12]
early_terminate:
  type: hyperband
  min_iter: 3
